# VisionEngine module — English bundle (active).
# Per CONST-046, every user-facing string in the VisionEngine module
# resolves through pkg/i18n.Translator at the call site. This bundle
# is the English fallback consumed when a consuming project wires a
# YAML-loading translator. The NoopTranslator (default, standalone)
# returns the msgID directly; the call site assembles the user-visible
# string from the literal embedded alongside the migration (see the
# i18n_defaults.go file in the consuming package).
#
# IDs are prefixed `visionengine_` per the CONST-046 cross-submodule
# convention so a single consuming-project bundle can merge entries
# from many submodules without collision.
schema_version: 1
locale: en
entries:
  visionengine_stub_screen_title: "Unknown Screen"
  visionengine_stub_screen_description: "Stub analysis - install OpenCV or use LLM vision for detailed analysis"
  visionengine_stub_screen_unknown_category: "Unknown"
  visionengine_provider_fallback_requires_one: "at least one provider is required"
  visionengine_provider_fallback_all_failed: "all providers failed, last error: %v"
  visionengine_config_invalid_vision_provider: "unknown vision provider %q"
  visionengine_config_invalid_ssim_threshold: "SSIM threshold must be between 0 and 1, got %f"
  visionengine_config_invalid_max_image_size: "max image size must be positive, got %d"
  visionengine_config_invalid_timeout: "timeout must be positive, got %d"
  visionengine_config_openai_key_required: "OPENAI_API_KEY required for openai provider"
  visionengine_config_anthropic_key_required: "ANTHROPIC_API_KEY required for anthropic provider"
  visionengine_config_gemini_key_required: "GOOGLE_API_KEY required for gemini provider"
  visionengine_config_qwen_key_required: "QWEN_API_KEY required for qwen provider"
  visionengine_config_kimi_key_required: "KIMI_API_KEY or MOONSHOT_API_KEY required for kimi provider"
  visionengine_config_stepgui_key_required: "STEPFUN_API_KEY required for stepgui provider"
